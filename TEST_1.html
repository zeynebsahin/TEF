<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEF Canada - Test 1</title>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 20px;
        }
        .btn-back {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: #2563eb;
            width: 0%;
        }
        .meta {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .audio-section {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }
        .btn-play {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .time-display {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-top: 5px;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .option-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 16px;
            cursor: pointer;
            margin-bottom: 12px;
            background: white;
        }
        .option-item.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .option-item.correct {
            border-color: #059669;
            background: #ecfdf5;
            color: #047857;
        }
        .option-item.wrong {
            border-color: #dc2626;
            background: #fef2f2;
            color: #b91c1c;
        }
        .btn-nav {
            width: 100%;
            background: #1e293b;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-nav:disabled {
            background: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="btn-back">◀ Retour</a>
        </div>

        <div id="quiz-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>

            <div class="meta">
                <span id="question-number">Question 1/1</span> | 
                <span id="section-title">Section A</span>
            </div>

            <div class="audio-section">
                <button id="btn-play" class="btn-play">▶ Écouter</button>
                <div id="listen-count" style="font-size: 12px; color: #64748b;">Écoutes : 0 / 2</div>
                <span id="time-display" class="time-display">0:00 / 0:00</span>
            </div>

            <div class="card">
                <div id="question-text" class="question-text"></div>
                <div id="options-list"></div>
            </div>

            <button id="btn-submit" class="btn-nav" disabled>Valider</button>
        </div>

        <div id="result-container" style="display: none;">
            <div class="card" style="text-align: center;">
                <h2>Test Terminé !</h2>
                <div id="result-score" style="font-size: 48px; font-weight: bold; color: #2563eb; margin: 20px 0;">0 / 0</div>
                <button onclick="location.reload()" class="btn-nav">Recommencer</button>
            </div>
        </div>
    </div>

    <script>
        // Eski Safari için tamamen eski tip Array ve Object yapısı
        var DATA = [
            {
                id: 1,
                section: "Section A",
                question: "Que devez-vous faire si vous arrivez en retard ?",
                options: [
                    "Attendre la prochaine session de test.",
                    "Entrer discrètement dans la salle.",
                    "Contacter immédiatement le secrétariat.",
                    "Reporter votre test à une autre date."
                ],
                correctAnswer: 0,
                audio: "data:audio/mpeg;base64,SUQzBAAAAAAAI1RSTRMAAAALAAADbXAzZ2FpbgBQaW5nAAAAAAA="
            }
        ];

        var currentQuestionIndex = 0;
        var selectedOptionIndex = null;
        var isAnswered = false;
        var score = 0;
        var listenCount = 0;
        var maxListens = 2;

        // Audio elementini HTML5 standart yöntemiyle oluşturuyoruz
        var audio = new Audio();

        var elProgressFill = document.getElementById('progress-fill');
        var elQuestionNumber = document.getElementById('question-number');
        var elSectionTitle = document.getElementById('section-title');
        var elQuestionText = document.getElementById('question-text');
        var elOptionsList = document.getElementById('options-list');
        var elBtnSubmit = document.getElementById('btn-submit');
        var elBtnPlay = document.getElementById('btn-play');
        var elTimeDisplay = document.getElementById('time-display');
        var elListenCount = document.getElementById('listen-count');
        var elQuizContainer = document.getElementById('quiz-container');
        var elResultContainer = document.getElementById('result-container');
        var elResultScore = document.getElementById('result-score');

        function initQuestion() {
            var currentData = DATA[currentQuestionIndex];
            if (!currentData) return;

            selectedOptionIndex = null;
            isAnswered = false;
            listenCount = 0;

            audio.src = currentData.audio;
            audio.load();

            elProgressFill.style.width = ((currentQuestionIndex / DATA.length) * 100) + '%';
            elQuestionNumber.innerHTML = "Question " + (currentQuestionIndex + 1) + " / " + DATA.length;
            elSectionTitle.innerHTML = currentData.section;
            elQuestionText.innerHTML = currentData.question;
            elListenCount.innerHTML = "Écoutes : 0 / " + maxListens;
            elBtnSubmit.innerHTML = "Valider";
            elBtnSubmit.disabled = true;
            elBtnPlay.innerHTML = "▶ Écouter";
            elTimeDisplay.innerHTML = "0:00 / 0:00";

            renderOptions(currentData);
        }

        function renderOptions(currentData) {
            elOptionsList.innerHTML = '';
            for (var i = 0; i < currentData.options.length; i++) {
                var item = document.createElement('div');
                item.className = 'option-item';
                item.setAttribute('data-index', i);
                item.innerHTML = currentData.options[i];

                item.onclick = function() {
                    if (isAnswered) return;
                    var idx = parseInt(this.getAttribute('data-index'), 10);
                    selectOption(idx);
                };

                elOptionsList.appendChild(item);
            }
        }

        function selectOption(index) {
            selectedOptionIndex = index;
            var items = elOptionsList.getElementsByClassName('option-item');
            for (var i = 0; i < items.length; i++) {
                items[i].className = 'option-item';
            }
            items[index].className = 'option-item selected';
            elBtnSubmit.disabled = false;
        }

        elBtnSubmit.onclick = function() {
            if (!isAnswered) {
                isAnswered = true;
                audio.pause();
                elBtnPlay.innerHTML = "▶ Écouter";

                var currentData = DATA[currentQuestionIndex];
                var items = elOptionsList.getElementsByClassName('option-item');

                for (var i = 0; i < items.length; i++) {
                    if (i === currentData.correctAnswer) {
                        items[i].className = 'option-item correct';
                    } else if (i === selectedOptionIndex) {
                        items[i].className = 'option-item wrong';
                    } else {
                        items[i].className = 'option-item';
                    }
                }

                if (selectedOptionIndex === currentData.correctAnswer) {
                    score++;
                }

                if (currentQuestionIndex === DATA.length - 1) {
                    elBtnSubmit.innerHTML = "Voir les résultats";
                } else {
                    elBtnSubmit.innerHTML = "Suivant";
                }
            } else {
                if (currentQuestionIndex < DATA.length - 1) {
                    currentQuestionIndex++;
                    initQuestion();
                } else {
                    showResults();
                }
            }
        };

        elBtnPlay.onclick = function() {
            if (audio.paused) {
                if (listenCount >= maxListens && audio.currentTime === 0) {
                    alert("Limite d'écoutes atteinte.");
                    return;
                }
                audio.play();
                elBtnPlay.innerHTML = "❚❚ Pause";
            } else {
                audio.pause();
                elBtnPlay.innerHTML = "▶ Écouter";
            }
        };

        audio.onplay = function() {
            if (audio.currentTime === 0) {
                listenCount++;
                elListenCount.innerHTML = "Écoutes : " + listenCount + " / " + maxListens;
            }
        };

        audio.onpause = function() {
            elBtnPlay.innerHTML = "▶ Écouter";
        };

        audio.onended = function() {
            elBtnPlay.innerHTML = "▶ Écouter";
        };

        audio.ontimeupdate = function() {
            if (audio.duration) {
                elTimeDisplay.innerHTML = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
            }
        };

        function formatTime(secs) {
            var m = Math.floor(secs / 60);
            var s = Math.floor(secs % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function showResults() {
            elQuizContainer.style.display = 'none';
            elResultContainer.style.display = 'block';
            elResultScore.innerHTML = score + " / " + DATA.length;
        }

        // İlk soruyu yükle
        initQuestion();
    </script>
</body>
</html>
